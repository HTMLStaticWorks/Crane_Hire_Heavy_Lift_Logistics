<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AeroLift</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        .auth-body {
            background-image: url('images/hero_bg_home2_1781934394224.png');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.6); /* Charcoal */
            backdrop-filter: blur(5px);
            z-index: 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: #fff;
        }
        
        [data-theme="dark"] .auth-card {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .auth-logo svg {
            height: 50px;
            fill: var(--secondary-color);
        }
        .auth-card .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.8rem 1rem;
        }
        .auth-card .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .auth-card .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--secondary-color);
            box-shadow: none;
            color: #fff;
        }
        .auth-card .form-label {
            font-weight: 500;
            color: rgba(255,255,255,0.9);
        }
        .social-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .btn-toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
        }
        .btn-toggle-password:hover {
            color: #fff;
        }
        
        /* Auth Toggles */
        .auth-toggles {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2;
            display: flex;
            gap: 10px;
        }
        .auth-toggles button {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 40px; height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="auth-body">

    <div class="auth-overlay"></div>
    
    <div class="auth-toggles">
        <button class="theme-toggle-btn" aria-label="Toggle Theme"><i class="bi bi-moon-fill"></i></button>
        <button class="rtl-toggle-btn" aria-label="Toggle RTL" style="font-size: 0.8rem; font-weight: 600;">RTL</button>
    </div>

    <div class="auth-card reveal reveal-zoom">
        <div class="text-center mb-4">
            <a href="index.html" class="auth-logo d-flex align-items-center justify-content-center text-decoration-none mb-2">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="height: 40px;">
                    <path d="M10,90 L90,90 L90,80 L60,80 L60,20 L80,20 L80,10 L20,10 L20,20 L40,20 L40,80 L10,80 Z" fill="var(--secondary-color)"/>
                    <circle cx="50" cy="50" r="10" fill="var(--primary-color)"/>
                </svg>
                <span class="fs-2 fw-bold ms-2 text-white">AeroLift</span>
            </a>
            <p class="text-white-50 mt-1">Sign in to your client portal</p>
        </div>

        <form action="#" method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="client@company.com" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-control" id="passwordInput" placeholder="••••••••" required>
                    <button type="button" class="btn-toggle-password" id="togglePasswordBtn">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check mb-0">
                    <input type="checkbox" class="form-check-input bg-transparent border-secondary" id="rememberMe">
                    <label class="form-check-label text-white-50 small" for="rememberMe">Remember me for 30 days</label>
                </div>
                <a href="#" class="text-secondary-brand text-decoration-none small">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold mb-4">Sign In</button>

            <div class="position-relative mb-4">
                <hr class="border-secondary opacity-25">
                <span class="position-absolute top-50 start-50 translate-middle px-2 small text-white-50" style="background: transparent;">Or continue with</span>
            </div>

            <div class="d-flex gap-2 mb-4">
                <button type="button" class="btn social-btn flex-fill d-flex align-items-center justify-content-center fs-5">
                    <i class="bi bi-google"></i>
                </button>
                <button type="button" class="btn social-btn flex-fill d-flex align-items-center justify-content-center fs-5">
                    <i class="bi bi-facebook"></i>
                </button>
                <button type="button" class="btn social-btn flex-fill d-flex align-items-center justify-content-center fs-5">
                    <i class="bi bi-apple"></i>
                </button>
            </div>

            <p class="text-center mb-0 small text-white-50">
                Don't have an account? <a href="signup.html" class="text-secondary-brand text-decoration-none fw-bold">Sign up</a>
            </p>
        </form>
    </div>

    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <script>
        // Password Visibility Toggle
        document.getElementById('togglePasswordBtn').addEventListener('click', function() {
            const pwdInput = document.getElementById('passwordInput');
            const icon = this.querySelector('i');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    </script>
</body>
</html>
